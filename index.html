
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>О'Масаж — масажний салон</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e1a14;
    --bg2: #152011;
    --green: #3d7a52;
    --green-light: #4f9e6a;
    --green-glow: rgba(61,122,82,0.18);
    --cream: #f0ede6;
    --muted: #7a9080;
    --white: #f5f5f0;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    font-family: 'Manrope', sans-serif;
    color: var(--white);
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 48px 20px;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, #1a3322 0%, transparent 65%),
      radial-gradient(ellipse 50% 40% at 20% 100%, #0a1a10 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 400px;
  }

  /* Leaf decoration */
  .leaf-top {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.85;
    animation: sway 4s ease-in-out infinite;
    filter: drop-shadow(0 4px 16px rgba(61,122,82,0.4));
  }

  @keyframes sway {
    0%, 100% { transform: rotate(-4deg) translateY(0); }
    50% { transform: rotate(4deg) translateY(-6px); }
  }

  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: clamp(38px, 10vw, 52px);
    letter-spacing: 0.04em;
    color: var(--white);
    text-align: center;
    line-height: 1;
  }

  .brand-name span {
    color: var(--green-light);
    font-style: italic;
  }

  .tagline {
    margin-top: 10px;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: center;
  }

  /* Ornament divider */
  .ornament {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0;
    width: 100%;
  }

  .ornament::before,
  .ornament::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--green), transparent);
    opacity: 0.4;
  }

  .ornament-icon {
    font-size: 16px;
    opacity: 0.6;
  }

  /* Buttons */
  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 22px;
    border-radius: 16px;
    text-decoration: none;
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: 15px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .link-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    background: rgba(255,255,255,0.05);
    transition: opacity 0.2s;
  }

  .link-btn:hover { transform: translateY(-3px); }
  .link-btn:hover::after { opacity: 1; }
  .link-btn:active { transform: translateY(0); }

  .btn-book {
    background: linear-gradient(135deg, #1e4a30 0%, #2a6340 100%);
    border: 1px solid rgba(61,122,82,0.5);
    color: #c8f0d8;
    box-shadow: 0 4px 24px rgba(61,122,82,0.25);
  }

  .btn-book:hover {
    box-shadow: 0 8px 32px rgba(61,122,82,0.4);
  }

  .btn-ig {
    background: linear-gradient(135deg, #1a1a2e 0%, #2a1a3a 100%);
    border: 1px solid rgba(180,80,160,0.3);
    color: #e8b8e8;
    box-shadow: 0 4px 20px rgba(160,40,140,0.15);
  }

  .btn-ig:hover {
    box-shadow: 0 8px 28px rgba(180,60,160,0.3);
  }

  .btn-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .btn-book .btn-icon { background: rgba(61,122,82,0.25); }
  .btn-ig .btn-icon { background: rgba(180,60,160,0.2); }

  .btn-text { display: flex; flex-direction: column; gap: 2px; }
  .btn-title { font-size: 15px; font-weight: 600; }
  .btn-sub { font-size: 11px; opacity: 0.55; font-weight: 400; }

  .btn-arrow {
    margin-left: auto;
    opacity: 0.35;
    font-size: 18px;
    transition: transform 0.18s, opacity 0.18s;
  }
  .link-btn:hover .btn-arrow { transform: translateX(4px); opacity: 0.65; }

  /* Services preview */
  .services {
    margin-top: 28px;
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(61,122,82,0.15);
    border-radius: 16px;
    padding: 20px;
  }

  .services-title {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    text-align: center;
  }

  .service-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .service-row:last-child { border-bottom: none; }

  .service-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--cream);
  }

  .service-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .service-time {
    font-size: 11px;
    color: var(--muted);
  }

  .service-price {
    font-size: 13px;
    font-weight: 600;
    color: var(--green-light);
  }

  .footer {
    margin-top: 32px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    opacity: 0.5;
  }

  /* Animations */
  .container > * {
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.5s ease forwards;
  }

  .leaf-top       { animation-delay: 0.05s; }
  .brand-name     { animation-delay: 0.12s; }
  .tagline        { animation-delay: 0.18s; }
  .ornament       { animation-delay: 0.24s; }
  .links          { animation-delay: 0.30s; }
  .services       { animation-delay: 0.38s; }
  .footer         { animation-delay: 0.46s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">

  <div class="leaf-top">🌿</div>

  <div class="brand-name">О'<span>Масаж</span></div>
  <div class="tagline">Масажний салон · Київ</div>

  <div class="ornament">
    <div class="ornament-icon">✦</div>
  </div>

  <div class="links">
    <a class="link-btn btn-book" href="https://t.me/parklakemassage" target="_blank" rel="noopener">
      <div class="btn-icon">✈️</div>
      <div class="btn-text">
        <div class="btn-title">Telegram канал</div>
        <div class="btn-sub">Записатися та дізнатись більше</div>
      </div>
      <div class="btn-arrow">→</div>
    </a>

    <a class="link-btn btn-ig" href="https://www.instagram.com/bielik_massage/" target="_blank" rel="noopener">
      <div class="btn-icon">📸</div>
      <div class="btn-text">
        <div class="btn-title">Instagram</div>
        <div class="btn-sub">@bielik_massage</div>
      </div>
      <div class="btn-arrow">→</div>
    </a>
  </div>

  <div class="services">
    <div class="services-title">Послуги</div>

    <div class="service-row">
      <div class="service-name">О'Масаж 60</div>
      <div class="service-meta">
        <div class="service-time">1 год</div>
        <div class="service-price">1 000 ₴</div>
      </div>
    </div>

    <div class="service-row">
      <div class="service-name">О'Масаж 90</div>
      <div class="service-meta">
        <div class="service-time">1 год 30 хв</div>
        <div class="service-price">1 350 ₴</div>
      </div>
    </div>

    <div class="service-row">
      <div class="service-name">О'Масаж 120</div>
      <div class="service-meta">
        <div class="service-time">2 год</div>
        <div class="service-price">1 700 ₴</div>
      </div>
    </div>

    <div class="service-row">
      <div class="service-name">О'Гуаша</div>
      <div class="service-meta">
        <div class="service-time">10 хв</div>
        <div class="service-price">від 1 ₴</div>
      </div>
    </div>
  </div>

  <div class="footer">© 2026 О'Масаж · Всі права захищені</div>

</div>
</body>
</html>
